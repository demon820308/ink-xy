name = "ink-xy-licensing-server"
main = "src/index.js"
compatibility_date = "2024-04-03"

routes = [
  { pattern = "inkxy.ipanic.bond", custom_domain = true }
]

[vars]
# For local testing, we fall back to this secret if wrangler secret JWT_SECRET is not set.
JWT_SECRET_FALLBACK = "super-secret-key-change-me"
ADMIN_TOKEN_FALLBACK = "admin-token-123456"

[[d1_databases]]
binding = "DB"
database_name = "licensing-db"
database_id = "548732ae-01b6-46c3-b6fe-a036bf678a31"
